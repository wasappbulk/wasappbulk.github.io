<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WasappBulk – Guide</title>
    <meta name="description" content="Complete guide to using WasappBulk - WhatsApp Bulk Sender" />
    <script>
      // Use the same SPA redirect logic as 404.html for consistent routing
      var l = window.location;
      var pathname = l.pathname.slice(1).replace(/&/g, '~and~');
      if (pathname === 'guide' || pathname === 'guide/') {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=/' + pathname.replace(/\/$/, '') +
          l.hash
        );
      }
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; margin: 20px; color: #666;">Redirecting to guide...</p>
  </body>
</html>
