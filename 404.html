<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WasappBulk</title>
    <script>
      // SPA redirect for GitHub Pages root domain
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
